name: Update repository

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '^3.11'

      - name: Set up environment
        run: |
          git config --global user.email "test@github.land"
          git config --global user.name "GitHub Almighty"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade tox

      - name: Run script
        # No space between `-e` and `run` or tox gets confused.
        # Retry once after a long wait so transient GitHub search API
        # failures (404 / 408 / secondary rate limit) do not burn a day.
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 2
          retry_wait_seconds: 900
          command: tox -erun -- -l DEBUG --hosts GitHub,OSF
        env:
          GITHUB_TOKEN: ${{ secrets.SEARCH_GITHUB_TOKEN }}

      - name: Push changes
        run: |
          ahead="$(git rev-list --count --right-only @{upstream}...HEAD)"
          if [ "$ahead" -gt 0 ]
          then git push
          else echo "No commits to push"
          fi

